networks:
  travel-network:
    driver: bridge

services:
  # 1. Baza Podataka - Prva u lancu
  travel-db:
    image: postgres:15-alpine
    container_name: travel-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: travel_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootpassword
    networks:
      - travel-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d travel_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Discovery Server (Eureka) - Čeka bazu, provjerava port 8761
  eureka-server:
    build:
      context: .
      dockerfile: backend/eureka-server/Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      - JAVA_OPTS=-Xms128m -Xmx256m -XX:MaxMetaspaceSize=128m
    depends_on:
      travel-db:
        condition: service_healthy
    networks:
      - travel-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      # Koristimo Netcat (nc) da provjerimo da li je port otvoren umjesto Actuator-a
      test: ["CMD-SHELL", "nc -z localhost 8761 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 3. API Gateway - Čeka Eureku, provjerava port 8080
  api-gateway:
    build:
      context: .
      dockerfile: backend/api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JAVA_OPTS=-Xms128m -Xmx256m -XX:MaxMetaspaceSize=128m
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - travel-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 4. Mikroservis: User Service - Čeka Gateway i Bazu, provjerava port 8081
  user-service:
    build:
      context: .
      dockerfile: backend/user-service/Dockerfile
    container_name: user-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JAVA_OPTS=-Xms128m -Xmx256m -XX:MaxMetaspaceSize=128m
      - SPRING_DATASOURCE_URL=jdbc:postgresql://travel-db:5432/travel_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=rootpassword
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
    depends_on:
      travel-db:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    networks:
      - travel-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8081 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 5. Mikroservis: Planning Service
  planning-service:
    build:
      context: .
      dockerfile: backend/planning-service/Dockerfile
    container_name: planning-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JAVA_OPTS=-Xms128m -Xmx256m -XX:MaxMetaspaceSize=128m
      - SPRING_DATASOURCE_URL=jdbc:postgresql://travel-db:5432/travel_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=rootpassword
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
    depends_on:
      travel-db:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    networks:
      - travel-network
    deploy:
      resources:
        limits:
          memory: 512M

  # 6. Mikroservis: Communication Service
  communication-service:
    build:
      context: .
      dockerfile: backend/communication-service/Dockerfile
    container_name: communication-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JAVA_OPTS=-Xms128m -Xmx256m -XX:MaxMetaspaceSize=128m
      - SPRING_DATASOURCE_URL=jdbc:postgresql://travel-db:5432/travel_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=rootpassword
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
    depends_on:
      travel-db:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    networks:
      - travel-network
    deploy:
      resources:
        limits:
          memory: 512M

  # 7. Mikroservis: Finance Reservation Service
  finance-reservation-service:
    build:
      context: .
      dockerfile: backend/finance-reservation-service/Dockerfile
    container_name: finance-reservation-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JAVA_OPTS=-Xms128m -Xmx256m -XX:MaxMetaspaceSize=128m
      - SPRING_DATASOURCE_URL=jdbc:postgresql://travel-db:5432/travel_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=rootpassword
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
    depends_on:
      travel-db:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    networks:
      - travel-network
    deploy:
      resources:
        limits:
          memory: 512M

  # 8. Frontend - Vraćen uslov na condition: service_healthy jer su portovi sada sigurni
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: travel-frontend
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - travel-network
    deploy:
      resources:
        limits:
          memory: 64M