version: '3.8'

networks:
  travel-network:
    driver: bridge

services:

  postgres-db:
    image: postgres:15-alpine
    container_name: travel-postgres
    environment:
      POSTGRES_USER: travel_user
      POSTGRES_PASSWORD: travel_password
      POSTGRES_DB: travel_planner_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - travel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travel_user -d travel_planner_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: travel-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672" # Management UI konzola
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - travel-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  eureka-server:
    build:
      context: ./backend
      dockerfile: ./eureka-server/Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - travel-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8761"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: ./backend
      dockerfile: ./api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - travel-network
    depends_on:
      eureka-server:
        condition: service_healthy

  user-service:
    build:
      context: ./backend
      dockerfile: ./user-service/Dockerfile
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - DB_URL=jdbc:postgresql://postgres-db:5432/travel_planner_db
      - DB_USERNAME=travel_user
      - DB_PASSWORD=travel_password
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - travel-network
    depends_on:
      postgres-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  planning-service:
    build:
      context: ./backend
      dockerfile: ./planning-service/Dockerfile
    container_name: planning-service
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
      - DB_URL=jdbc:postgresql://postgres-db:5432/travel_planner_db
      - DB_USERNAME=travel_user
      - DB_PASSWORD=travel_password
      - SPRING_RABBITMQ_HOST=rabbitmq
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - travel-network
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  communication-service:
    build:
      context: ./backend
      dockerfile: ./communication-service/Dockerfile
    container_name: communication-service
    ports:
      - "8084:8084"
    environment:
      - SERVER_PORT=8084
      - DB_URL=jdbc:postgresql://postgres-db:5432/travel_planner_db
      - DB_USERNAME=travel_user
      - DB_PASSWORD=travel_password
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - travel-network
    depends_on:
      postgres-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  finance-reservation-service:
    build:
      context: ./backend
      dockerfile: ./finance-reservation-service/Dockerfile
    container_name: finance-reservation-service
    ports:
      - "8083:8083"
    environment:
      - SERVER_PORT=8083
      - DB_URL=jdbc:postgresql://postgres-db:5432/travel_planner_db
      - DB_USERNAME=travel_user
      - DB_PASSWORD=travel_password
      - SPRING_RABBITMQ_HOST=rabbitmq
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_PROFILES_ACTIVE=docker
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB=DEBUG
      - LOGGING_LEVEL_COM_TRAVELPLANNER=DEBUG
      - LOGGING_LEVEL_ORG_HIBERNATE_SQL=DEBUG
    extra_hosts:
      - "localhost:host-gateway"
    networks:
      - travel-network
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8080/api
    container_name: travel-frontend
    ports:
      - "3000:80"   
    networks:
      - travel-network
    depends_on:
      api-gateway:
        condition: service_started

volumes:
  pgdata:
    driver: local