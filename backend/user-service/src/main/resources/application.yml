server:
  # Port for the microservice
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: user-service
  
  datasource:
    # DB URL from env, or default local database
    url: ${DB_URL:jdbc:postgresql://localhost:5432/user_db}
    # Database credentials (must be provided via env variables)
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    # ddl-auto should usually be 'update' for development
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        "[jdbc.lob.non_contextual_creation]": true